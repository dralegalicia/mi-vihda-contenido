name: Actualizador con IA

on:
  schedule:
    # Ejecuta a las 8:00 AM hora de México (14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Instalar dependencias
        run: pip install -U google-generativeai
          
      - name: Generar Contenido con IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_content.py
          
      - name: Guardar cambios
        run: |
          git config --global user.name 'IA Editor'
          git config --global user.email 'ia@editor.com'
          
          # Agregamos ambos archivos al área de preparación
          git add contenido_nutri.json salud.json
          
          # Solo realiza el commit si detecta cambios reales en los archivos
          if ! git diff --cached --quiet; then
            git commit -m "Actualización diaria de contenido IA: contenido_nutri.json y salud.json"
            git push
          else
            echo "No se detectaron cambios en el contenido generado."
          fi
