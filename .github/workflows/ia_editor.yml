name: Actualizador con IA

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Definimos el secreto aquí para que esté disponible en todo el job
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Instalar dependencias
        run: pip install -U google-generativeai
          
      - name: Generar Contenido con IA
        # Al definir env al nivel del job (arriba), este paso lo hereda automáticamente
        run: python generate_content.py
          
      - name: Guardar cambios
        run: |
          git config --global user.name 'IA Editor'
          git config --global user.email 'ia@editor.com'
          git add contenido_nutri.json
          if ! git diff --cached --quiet; then
            git commit -m "Actualización diaria de Línea de Vida con IA"
            git push
          else
            echo "No hay cambios para actualizar."
          fi
